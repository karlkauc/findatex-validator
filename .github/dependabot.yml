version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "java"
    open-pull-requests-limit: 10
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # JavaFX 22+ requires JDK 22+; project is on JDK 21. Revisit once
      # the build moves to JDK 25 LTS.
      - dependency-name: "org.openjfx:javafx-controls"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.openjfx:javafx-fxml"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/web-app/src/main/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "frontend"
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
