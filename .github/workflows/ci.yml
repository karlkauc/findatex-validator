name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test (JDK 21)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install xvfb (headless JavaFX tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb libgl1 libxtst6

      - name: Run all tests
        run: xvfb-run --auto-servernum mvn -B -ntp verify

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          if-no-files-found: ignore
          retention-days: 14

  docker:
    name: Docker image (smoke build)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: findatex-validator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
