# Deploys the web-app container to Google Cloud Run (europe-west3).
#
# Triggers:
#   - workflow_dispatch: manual run with the image tag to deploy
#     (used for rollbacks, deploying :edge, deploying older releases).
#   - workflow_run: auto-fires after the "Release" workflow finishes
#     successfully on a v* tag push. The job-level `if:` filters out
#     main-branch runs of release.yml (which only build the :edge image)
#     and any failed/cancelled runs.
#
# The image is pulled from ghcr.io (built by release.yml) and mirrored into
# Artifact Registry in the target region for fast cold-start pulls.
#
# Required GitHub repository **Variables** (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT         GCP project id (e.g. findatex-validator-prod)
#   GCP_WIF_PROVIDER    Full WIF provider resource name
#                       (projects/<num>/locations/global/workloadIdentityPools/github/providers/findatex)
#   GCP_DEPLOY_SA       Service account email
#                       (github-deploy@<project>.iam.gserviceaccount.com)
#
# One-time GCP bootstrap commands live in docs/DEPLOY_CLOUDRUN.md; rerun
# the gcloud commands there if any of the above changes.

name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (e.g. v1.0.0-rc1, latest, edge)'
        required: true
        type: string
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation
  packages: read    # required so GITHUB_TOKEN can pull the image from ghcr.io

concurrency:
  group: deploy-cloudrun-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: europe-west3
  AR_REPO: findatex
  IMAGE_NAME: findatex-validator-web
  SERVICE_NAME: findatex-validator-web
  GHCR_IMAGE: ghcr.io/karlkauc/findatex-validator-web

jobs:
  deploy:
    name: Deploy to Cloud Run
    # workflow_dispatch always runs; workflow_run only when the upstream
    # Release workflow finished green AND was triggered by a v* tag push.
    # `head_branch` for tag-triggered upstream runs is the tag name itself
    # (e.g. "v1.0.4"); main-branch runs of release.yml have head_branch="main"
    # and are filtered out so :edge does not auto-replace production.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROJECT: ${{ vars.GCP_PROJECT }}
    steps:
      - name: Resolve image tag
        id: resolve_tag
        # Manual runs pass the tag verbatim. Auto-runs read the upstream
        # Release workflow's head_branch (the v* tag) and strip the leading
        # "v" so it matches the GHCR/AR tag (the release pipeline pushes
        # `1.0.4`, not `v1.0.4`).
        env:
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${HEAD_BRANCH#v}"
          fi
          echo "Resolved image tag: ${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "TAG=${tag}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.5

      - name: Log in to GHCR (read-only via GITHUB_TOKEN)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | crane auth login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Configure docker auth for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Mirror GHCR image to Artifact Registry
        run: |
          set -euo pipefail
          src="${GHCR_IMAGE}:${TAG}"
          dst="${GCP_REGION}-docker.pkg.dev/${PROJECT}/${AR_REPO}/${IMAGE_NAME}:${TAG}"
          echo "Copying $src -> $dst"
          crane copy "$src" "$dst"
          echo "image=$dst" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        # --concurrency=8 + --max-instances=10 is the DoS-resistance baseline:
        # one bad actor opening 8 slow-loris uploads can pin at most a single
        # instance, leaving Cloud Run free to scale up and serve other users.
        # Combined with quarkus.http.{read,idle}-timeout in the app this caps
        # blast radius without adding Cloud Armor. Min-instances=0 keeps the
        # idle bill at zero; cold starts hit only the first request after a
        # quiet period.
        run: |
          set -euo pipefail
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${image}" \
            --region="${GCP_REGION}" \
            --project="${PROJECT}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=2Gi \
            --cpu=1 \
            --cpu-boost \
            --concurrency=8 \
            --max-instances=10 \
            --min-instances=0 \
            --timeout=300 \
            --set-env-vars=FINDATEX_WEB_EXTERNAL_ENABLED=false \
            --quiet

      - name: Show service URL
        run: |
          set -euo pipefail
          url="$(gcloud run services describe "${SERVICE_NAME}" \
            --region="${GCP_REGION}" \
            --project="${PROJECT}" \
            --format='value(status.url)')"
          echo "Deployed: $url"
          {
            echo "## Cloud Run deploy successful"
            echo
            echo "- Service: \`${SERVICE_NAME}\`"
            echo "- Region: \`${GCP_REGION}\`"
            echo "- Image tag: \`${TAG}\`"
            echo "- URL: $url"
          } >> "$GITHUB_STEP_SUMMARY"
