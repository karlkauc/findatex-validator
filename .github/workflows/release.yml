name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release (tags only)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build packages
        run: mvn -B -ntp -DskipTests package

      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          if [[ "$TAG" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $prerelease_flag \
            javafx-app/target/findatex-validator-javafx-*-shaded.jar

  native-installers:
    name: Native installer (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64,   installer_ext: deb, portable_ext: tar.gz }
          - { os: windows-latest, target: windows-x64, installer_ext: msi, portable_ext: zip    }
          - { os: macos-13,       target: macos-x64,   installer_ext: dmg, portable_ext: tar.gz }
          - { os: macos-14,       target: macos-arm64, installer_ext: dmg, portable_ext: tar.gz }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build shaded JAR
        shell: bash
        run: mvn -B -ntp -pl javafx-app -am -DskipTests package

      - name: Compute APP_VERSION from tag
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${REF_NAME#v}"          # v1.2.3 -> 1.2.3
          numeric="${tag%%-*}"          # 1.2.3-rc1 -> 1.2.3 (Windows jpackage requires numeric-only)
          echo "app_version=$numeric" >> "$GITHUB_OUTPUT"
          echo "Computed APP_VERSION=$numeric"

      - name: Build installer (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          APP_VENDOR: Karl Kauc
        run: ./package/jpackage.sh

      - name: Build portable app-image (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          APP_VENDOR: Karl Kauc
          PACKAGE_TYPE: app-image
        run: ./package/jpackage.sh

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          APP_VENDOR: Karl Kauc
        run: package\jpackage.bat

      - name: Build portable app-image (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          APP_VENDOR: Karl Kauc
          PACKAGE_TYPE: app-image
        run: package\jpackage.bat

      - name: Stage release artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          INSTALLER_EXT: ${{ matrix.installer_ext }}
          PORTABLE_EXT: ${{ matrix.portable_ext }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: |
          set -euo pipefail
          mkdir -p release-staging
          base="findatex-validator-${APP_VERSION}-${TARGET}"

          installer_src="$(find javafx-app/target/installer -maxdepth 1 -type f -name "*.${INSTALLER_EXT}" | head -n 1)"
          if [[ -z "$installer_src" ]]; then
            echo "No installer with extension .${INSTALLER_EXT} found." >&2
            ls -la javafx-app/target/installer || true
            exit 1
          fi
          cp "$installer_src" "release-staging/${base}.${INSTALLER_EXT}"

          portable_root="javafx-app/target/portable"
          portable_dir="$(find "$portable_root" -maxdepth 1 -mindepth 1 -type d | head -n 1)"
          if [[ -z "$portable_dir" ]]; then
            echo "No portable app-image directory under $portable_root." >&2
            ls -la "$portable_root" || true
            exit 1
          fi
          portable_name="$(basename "$portable_dir")"

          if [[ "$PORTABLE_EXT" == "zip" ]]; then
            (cd "$portable_root" && 7z a -tzip -mx=7 "../../../release-staging/${base}.zip" "$portable_name") >/dev/null
          else
            tar -C "$portable_root" -czf "release-staging/${base}.${PORTABLE_EXT}" "$portable_name"
          fi

          echo "Staged:"
          ls -la release-staging

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: findatex-validator-${{ steps.version.outputs.app_version }}-${{ matrix.target }}
          path: release-staging/*
          if-no-files-found: error
          retention-days: 7

  release-assets:
    name: Attach native installers to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native-installers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: findatex-validator-*
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -la artifacts
          gh release upload "$TAG" artifacts/* --clobber

  container:
    name: Container image (ghcr.io)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/karlkauc/findatex-validator-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
