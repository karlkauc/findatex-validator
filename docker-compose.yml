services:
  findatex-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: findatex-validator-web:1.0.0
    container_name: findatex-validator-web
    ports:
      # Host 18082 → container 8080 (host's :8080 is taken by other services).
      - "127.0.0.1:18082:8080"
    restart: unless-stopped
    environment:
      # --- Throttling --------------------------------------------------------
      FINDATEX_WEB_RATE_LIMIT_PER_IP_PER_HOUR: "10"
      FINDATEX_WEB_MAX_CONCURRENCY: "4"
      FINDATEX_WEB_REPORT_TTL_MINUTES: "5"

      # --- External validation (off by default) ------------------------------
      # Set to "true" plus the API keys / proxy settings below to enable.
      FINDATEX_WEB_EXTERNAL_ENABLED: "false"
      # FINDATEX_WEB_EXTERNAL_OPENFIGI_KEY: "your-key"
      # FINDATEX_WEB_EXTERNAL_PROXY_MODE: "MANUAL"
      # FINDATEX_WEB_EXTERNAL_PROXY_HOST: "proxy.example.com"
      # FINDATEX_WEB_EXTERNAL_PROXY_PORT: "8080"
      # FINDATEX_WEB_EXTERNAL_PROXY_USERNAME: "svc-findatex"
      # FINDATEX_WEB_EXTERNAL_PROXY_PASSWORD: "your-password"
      # FINDATEX_WEB_EXTERNAL_PROXY_NON_PROXY_HOSTS: "localhost,*.internal"

    healthcheck:
      # Both wget and curl missing in the eclipse-temurin:21-jre image — use a tiny java/sh check
      # against the in-container port 8080 (not the host-mapped one).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /q/health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
