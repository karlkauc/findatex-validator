services:
  findatex-web:
    build:
      context: .
      dockerfile: Dockerfile
      # Surfaced to /api/build-info via BUILD_GIT_COMMIT / BUILD_TIME env vars
      # in the final stage. Set on the host before invoking compose:
      #   GIT_COMMIT=$(git rev-parse HEAD) \
      #   BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
      #   docker compose up -d --build
      # Empty defaults keep `docker compose up` working without any preamble —
      # the endpoint then reports an empty commit, same as before this hook.
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
        BUILD_TIME: ${BUILD_TIME:-}
    image: findatex-validator-web:1.0.0
    container_name: findatex-validator-web
    ports:
      # Host 18082 → container 8080 (host's :8080 is taken by other services).
      - "127.0.0.1:18082:8080"
    restart: unless-stopped
    # --- Container hardening ---------------------------------------------------
    # App needs no Linux caps (no <1024 bind, no raw sockets), no privilege
    # escalation, and no writes outside /tmp + the mounted cache volume.
    read_only: true
    tmpfs:
      - /tmp:exec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    environment:
      # --- Throttling --------------------------------------------------------
      # Conservative no-login default — if an operator fronts the service with
      # auth or a WAF and wants to lift the cap, they raise this per-deploy.
      FINDATEX_WEB_RATE_LIMIT_PER_IP_PER_HOUR: "60"
      FINDATEX_WEB_MAX_CONCURRENCY: "8"
      FINDATEX_WEB_REPORT_TTL_MINUTES: "5"

      # --- External validation -----------------------------------------------
      # GLEIF (LEI) needs no key. OpenFIGI works without a key at 4 req/s; with
      # a key it goes up to 100 req/s. Users may also bring their own OpenFIGI
      # key per request — that one is never persisted.
      FINDATEX_WEB_EXTERNAL_ENABLED: "true"
      # Persistent cache dir (mounted as a named volume below — survives restarts).
      FINDATEX_WEB_EXTERNAL_CACHE_DIR: "/data/cache"
      # FINDATEX_WEB_EXTERNAL_OPENFIGI_KEY: "your-key"
      # FINDATEX_WEB_EXTERNAL_PROXY_MODE: "MANUAL"
      # FINDATEX_WEB_EXTERNAL_PROXY_HOST: "proxy.example.com"
      # FINDATEX_WEB_EXTERNAL_PROXY_PORT: "8080"
      # FINDATEX_WEB_EXTERNAL_PROXY_USERNAME: "svc-findatex"
      # FINDATEX_WEB_EXTERNAL_PROXY_PASSWORD: "your-password"
      # FINDATEX_WEB_EXTERNAL_PROXY_NON_PROXY_HOSTS: "localhost,*.internal"

    volumes:
      # GLEIF/OpenFIGI lookup cache. Persisting it across restarts avoids
      # re-fetching every LEI/ISIN every time the container is recreated.
      - findatex-cache:/data/cache

    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: "2.0"
        reservations:
          memory: 512M

    healthcheck:
      # BusyBox wget is bundled in alpine:3.23 — exits 0 on 2xx, non-zero on >=400.
      # Health endpoint moved to /_internal/health/* (out of the public /q/* namespace).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/_internal/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  findatex-cache:
