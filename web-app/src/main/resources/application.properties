# --- HTTP --------------------------------------------------------------------
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0
quarkus.http.limits.max-body-size=25M
quarkus.http.body.handle-file-uploads=true
quarkus.http.body.delete-uploaded-files-on-end=true

# Static SPA assets land here at build time (Vite output dir).
# Quarkus serves META-INF/resources/ as the document root.
quarkus.http.root-path=/

# --- Logging ------------------------------------------------------------------
quarkus.log.level=INFO
quarkus.log.category."com.findatex".level=INFO

# --- Application defaults (all overridable via env) ---------------------------
findatex.web.rate-limit.per-ip-per-hour=10
findatex.web.max-concurrency=4
findatex.web.acquire-timeout-millis=2000
findatex.web.report.ttl-minutes=5

findatex.web.external.enabled=false
findatex.web.external.proxy-mode=NONE
findatex.web.external.proxy-port=0
findatex.web.external.cache-dir=${java.io.tmpdir}/findatex-cache
findatex.web.external.cache-ttl-days=7

# Download URL for the JavaFX desktop build. Surfaced to the user once the web
# quota is exhausted so they can switch to the unmetered offline tool.
# Override: FINDATEX_WEB_DESKTOP_DOWNLOAD_URL (set to "" to hide the link).
findatex.web.desktop-download-url=https://github.com/karlkauc/findatex-validator
# Optional admin-controlled values — leave unset (env vars override at runtime):
#   findatex.web.external.openfigi-key       (default OpenFIGI key, optional)
#   findatex.web.external.proxy-host
#   findatex.web.external.proxy-username
#   findatex.web.external.proxy-password
#   findatex.web.external.proxy-non-proxy-hosts

# --- Security Headers (production) -------------------------------------------
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."Referrer-Policy".value=strict-origin-when-cross-origin
quarkus.http.header."Cross-Origin-Opener-Policy".value=same-origin
quarkus.http.header."Permissions-Policy".value=geolocation=(), microphone=(), camera=()
quarkus.http.header."Content-Security-Policy".value=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'

# --- Trust X-Forwarded-* only when behind a real proxy -----------------------
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-forwarded=true
quarkus.http.proxy.allow-x-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

# --- Move health endpoints out of the public /q namespace --------------------
quarkus.smallrye-health.root-path=/_internal/health

# --- Test profile -------------------------------------------------------------
%test.findatex.web.rate-limit.per-ip-per-hour=1000
%test.findatex.web.max-concurrency=8
%test.findatex.web.report.ttl-minutes=1
%test.quarkus.log.category."com.findatex".level=WARN
